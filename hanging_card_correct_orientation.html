
<div style="width:100%;height:620px;position:relative;overflow:hidden;background:linear-gradient(160deg,#0d0d0d 0%,#161616 100%);border-radius:12px;">
  <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.022) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;"></div>
  <canvas id="rc" style="position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:grab;"></canvas>
  <p style="position:absolute;bottom:16px;width:100%;text-align:center;color:rgba(255,255,255,0.18);font:12px/1 sans-serif;letter-spacing:.1em;pointer-events:none;margin:0;">drag · throw · watch it swing</p>
</div>
<script>
(function(){
const canvas=document.getElementById('rc');
const ctx=canvas.getContext('2d');

const NUM_SEG=14, SEG_LEN=22;
const CW=130, CH=182;
const GRAV=0.45, DAMP=0.986, ITER=30;

let nodes=[], dragging=false, dragNode=null;
let velX=0,velY=0,lastMX=0,lastMY=0;

function resize(){
  canvas.width=canvas.offsetWidth;
  canvas.height=canvas.offsetHeight;
}
resize();
window.addEventListener('resize',resize);

function init(){
  nodes=[];
  const cx=canvas.width/2;
  for(let i=0;i<=NUM_SEG;i++){
    nodes.push({x:cx,y:i*SEG_LEN,px:cx+(i?0.01:0),py:i*SEG_LEN-0.5,pinned:i===0});
  }
}
init();

function verlet(){
  for(const n of nodes){
    if(n.pinned)continue;
    const vx=(n.x-n.px)*DAMP,vy=(n.y-n.py)*DAMP;
    n.px=n.x;n.py=n.y;
    n.x+=vx;n.y+=vy+GRAV;
  }
}

function constrain(){
  for(let it=0;it<ITER;it++){
    nodes[0].x=canvas.width/2;nodes[0].y=0;
    for(let i=0;i<nodes.length-1;i++){
      const a=nodes[i],b=nodes[i+1];
      const dx=b.x-a.x,dy=b.y-a.y;
      const d=Math.sqrt(dx*dx+dy*dy)||.001;
      const diff=(d-SEG_LEN)/d*.5;
      const cx=dx*diff,cy=dy*diff;
      if(!a.pinned){a.x+=cx;a.y+=cy;}
      if(!b.pinned){b.x-=cx;b.y-=cy;}
    }
  }
}

function getXY(e){
  const r=canvas.getBoundingClientRect();
  const sx=canvas.width/r.width,sy=canvas.height/r.height;
  const src=e.touches?e.touches[0]:e;
  return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};
}

function nearest(mx,my){
  let best=null,bd=9999;
  for(const n of nodes){
    if(n.pinned)continue;
    const d=Math.hypot(n.x-mx,n.y-my);
    if(d<bd){bd=d;best=n;}
  }
  return bd<120?best:null;
}

function onDown(e){e.preventDefault();const{x,y}=getXY(e);dragNode=nearest(x,y)||nodes[nodes.length-1];dragging=true;lastMX=x;lastMY=y;velX=velY=0;canvas.style.cursor='grabbing';}
function onMove(e){e.preventDefault();if(!dragging)return;const{x,y}=getXY(e);velX=x-lastMX;velY=y-lastMY;dragNode.x=x;dragNode.y=y;dragNode.px=x-velX*.55;dragNode.py=y-velY*.55;lastMX=x;lastMY=y;}
function onUp(){if(!dragging)return;if(dragNode){dragNode.px=dragNode.x-velX*3.5;dragNode.py=dragNode.y-velY*3.5;}dragging=false;dragNode=null;canvas.style.cursor='grab';}

canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('mouseleave',onUp);
canvas.addEventListener('touchstart',onDown,{passive:false});
canvas.addEventListener('touchmove',onMove,{passive:false});
canvas.addEventListener('touchend',onUp,{passive:false});

function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawPivot(){
  const px=canvas.width/2;
  ctx.fillStyle='#2a2a2a';ctx.fillRect(px-32,0,64,5);
  ctx.fillStyle='#3a3a3a';ctx.fillRect(px-32,0,64,2);
  ctx.beginPath();ctx.arc(px,4,5.5,0,Math.PI*2);ctx.fillStyle='#555';ctx.fill();
  ctx.beginPath();ctx.arc(px,4,3.5,0,Math.PI*2);ctx.fillStyle='#222';ctx.fill();
}

function drawLanyard(){
  const n=nodes;
  if(n.length<2)return;
  for(let i=0;i<n.length-1;i++){
    const a=n[i],b=n[i+1];
    const dx=b.x-a.x,dy=b.y-a.y;
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=-dy/len*6,ny=dx/len*6;
    ctx.beginPath();
    ctx.moveTo(a.x-nx,a.y-ny);ctx.lineTo(b.x-nx,b.y-ny);
    ctx.lineTo(b.x+nx,b.y+ny);ctx.lineTo(a.x+nx,a.y+ny);
    ctx.closePath();ctx.fillStyle='#111';ctx.fill();
  }
  for(let i=0;i<n.length-1;i++){
    const a=n[i],b=n[i+1];
    const dx=b.x-a.x,dy=b.y-a.y;
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=-dy/len,ny=dx/len;
    ctx.beginPath();ctx.moveTo(a.x-nx*5,a.y-ny*5);ctx.lineTo(b.x-nx*5,b.y-ny*5);
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.stroke();
    ctx.beginPath();ctx.moveTo(a.x+nx*5,a.y+ny*5);ctx.lineTo(b.x+nx*5,b.y+ny*5);
    ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;ctx.stroke();
  }
  for(let i=1;i<n.length-2;i+=2){
    const a=n[i],b=n[i+1];
    const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
    const ang=Math.atan2(b.y-a.y,b.x-a.x);
    ctx.save();ctx.translate(mx,my);ctx.rotate(ang);
    ctx.font='bold 5px Arial';ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('ID CARD',0,0);ctx.restore();
  }
}

function drawCard(){
  const tip=nodes[nodes.length-1];
  const prev=nodes[nodes.length-2];

  // Angle: direction from prev to tip is "downward along rope"
  // We want card top to point TOWARD prev (up along rope)
  // So card local Y+ goes in the same direction as rope (downward)
  // angle = direction of rope segment, card hangs in that direction
  const dx=tip.x-prev.x, dy=tip.y-prev.y;
  const angle=Math.atan2(dy,dx) - Math.PI/2;
  // Now: local Y=0 is at tip (hole), local Y+ goes DOWN (away from rope)

  ctx.save();
  ctx.translate(tip.x,tip.y);
  ctx.rotate(angle);

  const w=CW, h=CH, r=10;
  // Card: hole at local (0,0) = top center
  // Card body goes from y=0 (top) to y=h (bottom)
  const L=-w/2, T=0;

  // Shadow
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.75)';ctx.shadowBlur=32;
  ctx.shadowOffsetX=5;ctx.shadowOffsetY=12;
  rr(L,T,w,h,r);ctx.fillStyle='#eee';ctx.fill();
  ctx.restore();

  // Clip
  rr(L,T,w,h,r);ctx.clip();

  // Card bg
  ctx.fillStyle='#f2ede7';ctx.fillRect(L,T,w,h);

  // Dark photo zone top 62%
  ctx.fillStyle='#0f0f0f';ctx.fillRect(L,T,w,h*0.62);

  // Vignette
  const vg=ctx.createRadialGradient(0,h*0.3,10,0,h*0.3,95);
  vg.addColorStop(0,'rgba(30,30,30,0)');vg.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=vg;ctx.fillRect(L,T,w,h*0.62);

  // Photo silhouette
  const pw=72,ph=86,pxo=-36,pyo=T+14;
  ctx.fillStyle='#191919';ctx.fillRect(pxo,pyo,pw,ph);
  ctx.fillStyle='#2d2d2d';
  ctx.beginPath();ctx.ellipse(0,pyo+24,16,18,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(0,pyo+ph+6,26,16,0,Math.PI,0,true);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.strokeRect(pxo,pyo,pw,ph);

  // Light leak
  const ll=ctx.createRadialGradient(L+14,T+14,0,L+14,T+14,55);
  ll.addColorStop(0,'rgba(255,255,255,0.07)');ll.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=ll;ctx.fillRect(L,T,w,h*0.62);

  const infoT=T+h*0.64;
  ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(L+10,infoT-2,w-20,.5);

  // Name
  ctx.fillStyle='#1a1a1a';
  ctx.font='bold 12px "Helvetica Neue",Arial,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('HANNAN',0,infoT+2);

  // Role
  ctx.fillStyle='#777';ctx.font='6.5px "Helvetica Neue",Arial,sans-serif';
  ctx.fillText('FULL‑STACK DEVELOPER',0,infoT+16);

  ctx.fillStyle='rgba(0,0,0,0.08)';ctx.fillRect(L+20,infoT+28,w-40,.5);

  // Tech chips
  const chips=['Next.js','Node.js','Flutter'];
  let cx3=-((chips.length*36+(chips.length-1)*4)/2);
  const cy3=infoT+33;
  for(const chip of chips){
    ctx.fillStyle='rgba(0,0,0,0.07)';
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(cx3,cy3,36,11,3);
    else ctx.rect(cx3,cy3,36,11);
    ctx.fill();
    ctx.fillStyle='#555';ctx.font='5.5px Arial';ctx.textAlign='center';
    ctx.fillText(chip,cx3+18,cy3+4);cx3+=40;
  }

  ctx.fillStyle='#555';ctx.font='bold 7.5px Arial';ctx.textAlign='center';
  ctx.fillText('RapidTechPro',0,infoT+50);

  // Bottom strip
  const botY=T+h-24;
  ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(L,botY,w,24);
  ctx.fillStyle='#aaa';ctx.font='5px Arial';ctx.fillText('MBD-001 · 2026',0,T+h-9);
  for(let i=0;i<18;i++){
    ctx.fillStyle=`rgba(0,0,0,${.1+.05*(i%3)})`;
    ctx.fillRect(-28+i*3.2,botY+3,i%4===0?2:1,7);
  }

  // Unclip then draw border
  ctx.restore();
  rr(L,T,w,h,r);
  ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=1;ctx.stroke();

  // Metal eyelet at (0,0) — rope tip = top of card hole
  ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fill();
  ctx.beginPath();ctx.arc(0,0,5.5,0,Math.PI*2);
  ctx.fillStyle='#999';ctx.fill();
  ctx.beginPath();ctx.arc(0,0,3.5,0,Math.PI*2);
  ctx.fillStyle='#111';ctx.fill();
  ctx.beginPath();ctx.arc(-1,-1,1.2,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fill();

  ctx.restore();
}

function loop(){
  if(canvas.width!==canvas.offsetWidth||canvas.height!==canvas.offsetHeight){
    canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;
  }
  ctx.clearRect(0,0,canvas.width,canvas.height);
  nodes[0].x=canvas.width/2;nodes[0].y=0;
  if(!dragging)verlet();
  constrain();
  drawPivot();
  drawLanyard();
  drawCard();
  requestAnimationFrame(loop);
}
loop();
})();
</script>
